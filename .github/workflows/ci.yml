name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v

  discover-apps-ps:
    # Smoke test for scripts/windows/discover_apps.ps1 — runs the script
    # under -DryRun (no Registry/AppX access) and asserts stdout parses as
    # a non-empty JSON array with the shape core.discovery expects. Catches
    # PowerShell syntax regressions before they hit the Windows guest.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Defense in depth: the DryRun path is read-only, but we still
          # do not want the job's GITHUB_TOKEN left persisted in
          # .git/config where any subsequent step (including the pwsh
          # smoke test) could observe it.
          persist-credentials: false
      - name: Ensure PowerShell Core is available
        run: |
          if command -v pwsh >/dev/null 2>&1; then
            echo "pwsh already installed: $(pwsh --version)"
          else
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends wget apt-transport-https ca-certificates
            # Official Microsoft repository for PowerShell on Ubuntu.
            source /etc/os-release
            wget -q "https://packages.microsoft.com/config/ubuntu/${VERSION_ID}/packages-microsoft-prod.deb" -O /tmp/packages-microsoft-prod.deb
            sudo dpkg -i /tmp/packages-microsoft-prod.deb
            sudo apt-get update
            sudo apt-get install -y powershell
            pwsh --version
          fi
      - name: Run discover_apps.ps1 -DryRun and validate JSON shape
        run: |
          pwsh -NoProfile -File scripts/windows/discover_apps.ps1 -DryRun > /tmp/discover.json
          python3 scripts/ci/validate_discover_dryrun.py /tmp/discover.json

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install pip-audit
      # Avoid `[all]` here: libvirt-python requires libvirt-dev system headers
      # that are not preinstalled on ubuntu-latest runners, which would break
      # the audit job (including on docs-only PRs). `all-no-libvirt` covers
      # gui/docker/dev extras without the native build dependency.
      - run: pip install -e ".[all-no-libvirt]" || pip install -e ".[dev]"
      - run: pip-audit --desc --skip-editable
        continue-on-error: true

  pwsh-tests:
    # Pester 5 suite for the agent-first install state machine
    # (config/oem/install-state-helpers.ps1 + install-step-functions.ps1).
    # Runs the marker / retry counter / redactor parity / step contract
    # tests on PowerShell Core under Linux. The actual install path runs
    # on Windows in production; this job catches contract regressions
    # without spinning up a Windows runner.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Ensure PowerShell Core is available
        run: |
          if command -v pwsh >/dev/null 2>&1; then
            echo "pwsh already installed: $(pwsh --version)"
          else
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends wget apt-transport-https ca-certificates
            source /etc/os-release
            wget -q "https://packages.microsoft.com/config/ubuntu/${VERSION_ID}/packages-microsoft-prod.deb" -O /tmp/packages-microsoft-prod.deb
            sudo dpkg -i /tmp/packages-microsoft-prod.deb
            sudo apt-get update
            sudo apt-get install -y powershell
            pwsh --version
          fi
      - name: Install Pester 5+ and ThreadJob (CurrentUser scope)
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -MinimumVersion 5.0 -Force -SkipPublisherCheck -Scope CurrentUser
          Install-Module -Name ThreadJob -Force -SkipPublisherCheck -Scope CurrentUser
          Get-Module -ListAvailable Pester, ThreadJob | Select-Object Name, Version
      - name: Run Pester suite (tests/pwsh/) with NUnit XML output
        shell: pwsh
        run: |
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = 'tests/pwsh'
          $cfg.Run.Exit = $true
          $cfg.Output.Verbosity = 'Detailed'
          $cfg.TestResult.Enabled = $true
          $cfg.TestResult.OutputFormat = 'NUnitXml'
          $cfg.TestResult.OutputPath = 'pester-results.xml'
          Invoke-Pester -Configuration $cfg
      - name: Upload Pester NUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-results
          path: pester-results.xml
          if-no-files-found: warn
